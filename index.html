<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Punch Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EA;
    --ink: #2B2823;
    --muted: #6B6354;
    --faint: #A89F8E;
    --line: #E4DDD0;
    --track: #F0EBE1;
    --luigi: #D97757;
    --juan: #4A7C7C;
    --sergio: #8B6F47;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'IBM Plex Sans', Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--ink);
  }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--faint);
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Spectral', Georgia, serif;
    font-size: 38px;
    font-weight: 700;
    margin: 0 0 8px 0;
    letter-spacing: -0.01em;
  }
  .sub { font-size: 14px; color: var(--muted); line-height: 1.5; }

  .panel {
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .panel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--faint);
    margin-bottom: 14px;
  }

  .person-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .person-card {
    flex: 1 1 140px;
    min-width: 140px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 12px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .person-name {
    font-family: 'Spectral', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .shift-info { font-size: 12px; color: var(--muted); }
  .shift-elapsed {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    margin: 2px 0 4px;
  }
  .action-btn {
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 12px;
    cursor: pointer;
    margin-top: 4px;
    transition: transform 0.12s ease;
    font-family: inherit;
  }
  .action-btn:active { transform: scale(0.97) translateY(1px); }

  .leader-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .toggle-group { display: flex; gap: 14px; }
  .toggle-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0 0 4px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--faint);
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .toggle-btn.active { color: var(--ink); border-color: var(--ink); }

  .leaderboard-list { display: flex; flex-direction: column; gap: 16px; }
  .leader-row { display: flex; gap: 12px; align-items: flex-start; }
  .leader-rank {
    font-family: 'Spectral', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
    color: #D9D2C4;
    width: 24px;
    text-align: right;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .leader-main { flex: 1; }
  .leader-top-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .leader-name { font-family: 'Spectral', Georgia, serif; font-size: 17px; font-weight: 600; }
  .leader-value { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; }
  .leader-suffix { font-size: 11px; color: var(--faint); font-weight: 400; }
  .bar-track { height: 6px; background: var(--track); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); }
  .leader-meta {
    font-size: 11px; color: var(--faint); margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .empty-state { font-size: 13px; color: var(--faint); line-height: 1.6; padding: 8px 0; }

  .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 120px; }
  .form-label {
    font-size: 11px; letter-spacing: 0.08em; color: var(--faint);
    font-family: 'IBM Plex Mono', monospace;
  }
  select, input {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    background: #fff;
    color: var(--ink);
  }
  .add-btn {
    border: none; border-radius: 6px; background: var(--ink); color: #fff;
    font-size: 14px; font-weight: 600; padding: 10px 18px; cursor: pointer;
    font-family: inherit;
  }
  .add-btn:disabled { opacity: 0.5; cursor: default; }

  .log-list { display: flex; flex-direction: column; gap: 2px; }
  .log-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 6px;
    border-radius: 6px; font-size: 13px; transition: background 0.15s ease;
  }
  .log-row:hover { background: #FAF6EF; }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .log-person { font-weight: 600; width: 60px; flex-shrink: 0; }
  .log-date {
    color: var(--faint); width: 52px; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; flex-shrink: 0;
  }
  .log-times { flex: 1; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }
  .log-duration { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 13px; }
  .delete-btn {
    background: none; border: none; color: #D9D2C4; cursor: pointer;
    font-size: 13px; padding: 0 2px; flex-shrink: 0;
  }

  footer {
    text-align: center; font-size: 11px; color: var(--faint);
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; margin-top: 8px;
  }

  .config-banner {
    background: #FFF4E6; border: 1px solid #F0C896; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6;
  }
  .config-banner code {
    background: #FAEFE0; padding: 2px 5px; border-radius: 4px; font-size: 12px;
  }

  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .pulsing { animation: pulse-dot 1.6s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .bar-fill { transition: none; }
    .pulsing { animation: none; }
  }
</style>
</head>
<body>
<div class="page">

  <div id="config-banner" class="config-banner" style="display:none;"></div>

  <header>
    <div class="eyebrow">SHIFT REGISTER · GROUP CLOCK</div>
    <h1>The Punch Board</h1>
    <div class="sub">Clock in, clock out, and watch the lifetime tally settle the score.</div>
  </header>

  <!-- Clock in/out -->
  <section class="panel">
    <div class="panel-label">WHO'S ON THE CLOCK</div>
    <div class="person-row" id="person-row"></div>
  </section>

  <!-- Leaderboard -->
  <section class="panel">
    <div class="leader-header-row">
      <div class="panel-label">LEADERBOARD</div>
      <div class="toggle-group">
        <button class="toggle-btn active" id="toggle-lifetime">Lifetime</button>
        <button class="toggle-btn" id="toggle-average">Daily average</button>
      </div>
    </div>
    <div id="leaderboard"></div>
  </section>

  <!-- Manual entry -->
  <section class="panel">
    <div class="panel-label">LOG A PAST SHIFT</div>
    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Person</label>
        <select id="manual-person">
          <option value="Luigi">Luigi</option>
          <option value="Juan">Juan</option>
          <option value="Sergio">Sergio</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Date</label>
        <input type="date" id="manual-date" />
      </div>
      <div class="form-field">
        <label class="form-label">Clock in</label>
        <input type="time" id="manual-start" value="09:00" />
      </div>
      <div class="form-field">
        <label class="form-label">Clock out</label>
        <input type="time" id="manual-end" value="17:00" />
      </div>
    </div>
    <button class="add-btn" id="add-shift-btn">Add shift</button>
  </section>

  <!-- Recent log -->
  <section class="panel">
    <div class="panel-label">RECENT PUNCHES</div>
    <div id="recent-log"></div>
  </section>

  <footer>Shared with Luigi, Juan &amp; Sergio · data is stored in a shared Google Sheet</footer>
</div>

<script>
/* =========================================================================
   CONFIG — paste your Apps Script Web App URL below between the quotes.
   Example: 'https://script.google.com/macros/s/AKfycby.../exec'
   ========================================================================= */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwBOJ6qBRgltHYwgvQCzKDHRu0Ezy2plaV4eQVTaxGlqovIO89wEOv7QPzg4gngqcsD/exec';

const PEOPLE = ['Luigi', 'Juan', 'Sergio'];
const COLORS = { Luigi: '#D97757', Juan: '#4A7C7C', Sergio: '#8B6F47' };

// Active shifts are stored locally per-browser (see note in config banner).
const ACTIVE_SHIFTS_KEY = 'punchboard-active-shifts';

let entries = [];
let activeShifts = JSON.parse(localStorage.getItem(ACTIVE_SHIFTS_KEY) || '{}');
let viewMode = 'lifetime';

function formatDuration(hoursDecimal) {
  const totalMinutes = Math.round(hoursDecimal * 60);
  const h = Math.floor(totalMinutes / 60);
  const m = totalMinutes % 60;
  return `${h}h ${String(m).padStart(2, '0')}m`;
}
function formatClock(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function formatDate(date) {
  return date.toLocaleDateString([], { day: '2-digit', month: 'short' });
}

async function apiGet() {
  const res = await fetch(WEB_APP_URL);
  const data = await res.json();
  return data.entries || [];
}
async function apiAdd(entry) {
  await fetch(WEB_APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', entry }),
  });
}
async function apiDelete(id) {
  await fetch(WEB_APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id }),
  });
}

function saveActiveShifts() {
  localStorage.setItem(ACTIVE_SHIFTS_KEY, JSON.stringify(activeShifts));
}

async function loadData() {
  try {
    entries = await apiGet();
  } catch (e) {
    console.error('Failed to load entries', e);
    entries = [];
  }
  render();
}

async function clockIn(person) {
  activeShifts[person] = new Date().toISOString();
  saveActiveShifts();
  render();
}

async function clockOut(person) {
  const startIso = activeShifts[person];
  if (!startIso) return;
  const start = new Date(startIso);
  const end = new Date();
  const hours = (end - start) / (1000 * 60 * 60);

  delete activeShifts[person];
  saveActiveShifts();

  if (hours > 0) {
    const entry = {
      id: `${person}-${end.getTime()}`,
      person,
      start: start.toISOString(),
      end: end.toISOString(),
      hours,
    };
    entries.unshift(entry);
    render();
    try {
      await apiAdd(entry);
    } catch (e) {
      console.error('Failed to save entry', e);
    }
  } else {
    render();
  }
}

async function addManualEntry() {
  const person = document.getElementById('manual-person').value;
  const date = document.getElementById('manual-date').value;
  const startStr = document.getElementById('manual-start').value;
  const endStr = document.getElementById('manual-end').value;
  if (!date || !startStr || !endStr) return;

  const start = new Date(`${date}T${startStr}:00`);
  const end = new Date(`${date}T${endStr}:00`);
  let hours = (end - start) / (1000 * 60 * 60);
  if (hours <= 0) hours += 24;

  const entry = {
    id: `${person}-${Date.now()}`,
    person,
    start: start.toISOString(),
    end: end.toISOString(),
    hours,
  };
  entries.unshift(entry);
  render();
  try {
    await apiAdd(entry);
  } catch (e) {
    console.error('Failed to save entry', e);
  }
}

async function deleteEntry(id) {
  entries = entries.filter((e) => e.id !== id);
  render();
  try {
    await apiDelete(id);
  } catch (e) {
    console.error('Failed to delete entry', e);
  }
}

function computeStats() {
  return PEOPLE.map((person) => {
    const personEntries = entries.filter((e) => e.person === person);
    const totalHours = personEntries.reduce((sum, e) => sum + e.hours, 0);
    const days = new Set(personEntries.map((e) => e.start.slice(0, 10))).size;
    const avgHours = days > 0 ? totalHours / days : 0;
    return { person, totalHours, avgHours, shifts: personEntries.length, days };
  });
}

function renderPersonRow() {
  const now = new Date();
  const container = document.getElementById('person-row');
  container.innerHTML = '';
  PEOPLE.forEach((person) => {
    const shiftStart = activeShifts[person];
    const isActive = !!shiftStart;
    const card = document.createElement('div');
    card.className = 'person-card';
    card.style.borderColor = isActive ? COLORS[person] : '#E4DDD0';
    card.style.background = isActive ? `${COLORS[person]}0D` : '#FFFFFF';

    const nameDiv = document.createElement('div');
    nameDiv.className = 'person-name';
    const dot = document.createElement('span');
    dot.className = 'dot' + (isActive ? ' pulsing' : '');
    dot.style.background = COLORS[person];
    nameDiv.appendChild(dot);
    nameDiv.appendChild(document.createTextNode(person));
    card.appendChild(nameDiv);

    if (isActive) {
      const elapsedHours = (now - new Date(shiftStart)) / (1000 * 60 * 60);
      const info = document.createElement('div');
      info.className = 'shift-info';
      info.textContent = `In since ${formatClock(new Date(shiftStart))}`;
      card.appendChild(info);

      const elapsed = document.createElement('div');
      elapsed.className = 'shift-elapsed';
      elapsed.style.color = COLORS[person];
      elapsed.textContent = formatDuration(elapsedHours);
      card.appendChild(elapsed);

      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.style.background = COLORS[person];
      btn.textContent = 'Clock out';
      btn.onclick = () => clockOut(person);
      card.appendChild(btn);
    } else {
      const info = document.createElement('div');
      info.className = 'shift-info';
      info.textContent = 'Not clocked in';
      card.appendChild(info);

      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.style.background = '#2B2823';
      btn.textContent = 'Clock in';
      btn.onclick = () => clockIn(person);
      card.appendChild(btn);
    }

    container.appendChild(card);
  });
}

function renderLeaderboard() {
  const stats = computeStats();
  const sorted = [...stats].sort((a, b) =>
    viewMode === 'lifetime' ? b.totalHours - a.totalHours : b.avgHours - a.avgHours
  );
  const maxValue = Math.max(1, ...sorted.map((s) => (viewMode === 'lifetime' ? s.totalHours : s.avgHours)));

  const container = document.getElementById('leaderboard');
  container.innerHTML = '';

  if (sorted.every((s) => s.shifts === 0)) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No shifts logged yet. Clock in above or add a past shift below to start the board.';
    container.appendChild(empty);
    return;
  }

  const list = document.createElement('div');
  list.className = 'leaderboard-list';

  sorted.forEach((s, idx) => {
    const value = viewMode === 'lifetime' ? s.totalHours : s.avgHours;
    const pct = (value / maxValue) * 100;

    const row = document.createElement('div');
    row.className = 'leader-row';

    const rank = document.createElement('div');
    rank.className = 'leader-rank';
    rank.textContent = idx + 1;
    row.appendChild(rank);

    const main = document.createElement('div');
    main.className = 'leader-main';

    const topLine = document.createElement('div');
    topLine.className = 'leader-top-line';
    const name = document.createElement('span');
    name.className = 'leader-name';
    name.textContent = s.person;
    const val = document.createElement('span');
    val.className = 'leader-value';
    val.textContent = formatDuration(value);
    if (viewMode === 'average') {
      const suffix = document.createElement('span');
      suffix.className = 'leader-suffix';
      suffix.textContent = ' / day';
      val.appendChild(suffix);
    }
    topLine.appendChild(name);
    topLine.appendChild(val);
    main.appendChild(topLine);

    const track = document.createElement('div');
    track.className = 'bar-track';
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = `${pct}%`;
    fill.style.background = COLORS[s.person];
    track.appendChild(fill);
    main.appendChild(track);

    const meta = document.createElement('div');
    meta.className = 'leader-meta';
    meta.textContent = `${s.shifts} shift${s.shifts !== 1 ? 's' : ''} · ${s.days} day${s.days !== 1 ? 's' : ''} logged`;
    main.appendChild(meta);

    row.appendChild(main);
    list.appendChild(row);
  });

  container.appendChild(list);
}

function renderRecentLog() {
  const recent = [...entries].sort((a, b) => new Date(b.start) - new Date(a.start)).slice(0, 12);
  const container = document.getElementById('recent-log');
  container.innerHTML = '';

  if (recent.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Nothing logged yet — shifts will appear here.';
    container.appendChild(empty);
    return;
  }

  const list = document.createElement('div');
  list.className = 'log-list';

  recent.forEach((e) => {
    const row = document.createElement('div');
    row.className = 'log-row';

    const dot = document.createElement('span');
    dot.className = 'log-dot';
    dot.style.background = COLORS[e.person];
    row.appendChild(dot);

    const person = document.createElement('span');
    person.className = 'log-person';
    person.textContent = e.person;
    row.appendChild(person);

    const date = document.createElement('span');
    date.className = 'log-date';
    date.textContent = formatDate(new Date(e.start));
    row.appendChild(date);

    const times = document.createElement('span');
    times.className = 'log-times';
    times.textContent = `${formatClock(new Date(e.start))} – ${formatClock(new Date(e.end))}`;
    row.appendChild(times);

    const dur = document.createElement('span');
    dur.className = 'log-duration';
    dur.textContent = formatDuration(e.hours);
    row.appendChild(dur);

    const del = document.createElement('button');
    del.className = 'delete-btn';
    del.textContent = '✕';
    del.title = 'Remove this entry';
    del.onclick = () => deleteEntry(e.id);
    row.appendChild(del);

    list.appendChild(row);
  });

  container.appendChild(list);
}

function render() {
  renderPersonRow();
  renderLeaderboard();
  renderRecentLog();
}

document.getElementById('toggle-lifetime').onclick = () => {
  viewMode = 'lifetime';
  document.getElementById('toggle-lifetime').classList.add('active');
  document.getElementById('toggle-average').classList.remove('active');
  renderLeaderboard();
};
document.getElementById('toggle-average').onclick = () => {
  viewMode = 'average';
  document.getElementById('toggle-average').classList.add('active');
  document.getElementById('toggle-lifetime').classList.remove('active');
  renderLeaderboard();
};
document.getElementById('add-shift-btn').onclick = addManualEntry;

// default manual date to today
document.getElementById('manual-date').value = new Date().toISOString().slice(0, 10);

// tick the active-shift timers every 30s
setInterval(renderPersonRow, 30000);

// config check
if (!WEB_APP_URL) {
  const banner = document.getElementById('config-banner');
  banner.style.display = 'block';
  banner.innerHTML = 'Setup needed: paste your Google Apps Script Web App URL into the <code>WEB_APP_URL</code> constant near the top of the script in this file, then re-upload to GitHub.';
  document.getElementById('add-shift-btn').disabled = true;
} else {
  loadData();
}
</script>
</body>
</html>
